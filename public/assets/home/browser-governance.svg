  <text x="170" y="620" fill="#FFFFFF" font-size="30" font-family="Arial, sans-serif" font-weight="700">This prompt contains personal identifiers and special-category data.</text>
  <text x="170" y="664" fill="#B5B5B5" font-size="22" font-family="Arial, sans-serif">Remove the restricted fields, redact them, or route the workflow through a governed app.</text>

