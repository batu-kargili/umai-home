  <text x="995" y="402" fill="#FFFFFF" font-size="22" font-family="Arial, sans-serif" font-weight="700">Model</text>
  <text x="995" y="438" fill="#8D8D8D" font-size="18" font-family="Arial, sans-serif">provider or local</text>
