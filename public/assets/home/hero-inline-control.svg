  <text x="820" y="374" fill="#050505" font-size="24" font-family="Arial, sans-serif" font-weight="700">UMAI Guardrail</text>
  <text x="820" y="410" fill="#4A4A4A" font-size="18" font-family="Arial, sans-serif">PRE_LLM • POST_LLM • Audit</text>
  <rect x="820" y="438" width="178" height="36" rx="18" fill="#111111"/>
  <text x="851" y="462" fill="#FFFFFF" font-size="16" font-family="Arial, sans-serif" font-weight="700">ALLOW / BLOCK / WARN</text>

  <path d="M1058 412H1124" stroke="#F3F3F3" stroke-width="4" stroke-linecap="round"/>
  <path d="M1116 394L1150 412L1116 430" fill="#F3F3F3"/>

  <rect x="944" y="560" width="172" height="96" rx="24" fill="#111111" stroke="#2C2C2C" stroke-width="2"/>
