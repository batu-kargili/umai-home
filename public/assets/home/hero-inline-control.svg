  <circle cx="136" cy="108" r="8" fill="#A3A3A3"/>
  <circle cx="168" cy="108" r="8" fill="#505050"/>

  <text x="76" y="186" fill="#8D8D8D" font-size="20" font-family="Arial, sans-serif" font-weight="700" letter-spacing="3">INLINE CONTROL LAYER</text>
  <text x="76" y="246" fill="#FFFFFF" font-size="56" font-family="Arial, sans-serif" font-weight="700">User → App → UMAI → Model</text>
  <text x="76" y="288" fill="#8D8D8D" font-size="24" font-family="Arial, sans-serif">One runtime path. One evidence trail. One operator surface.</text>

  <rect x="76" y="352" width="220" height="120" rx="26" fill="#111111" stroke="#2C2C2C" stroke-width="2"/>
  <text x="106" y="402" fill="#FFFFFF" font-size="22" font-family="Arial, sans-serif" font-weight="700">User request</text>
  <text x="106" y="438" fill="#8D8D8D" font-size="18" font-family="Arial, sans-serif">prompt or browser action</text>

  <path d="M320 412H394" stroke="#F3F3F3" stroke-width="4" stroke-linecap="round"/>
  <path d="M386 394L420 412L386 430" fill="#F3F3F3"/>

  <rect x="430" y="352" width="220" height="120" rx="26" fill="#111111" stroke="#2C2C2C" stroke-width="2"/>
  <text x="470" y="402" fill="#FFFFFF" font-size="22" font-family="Arial, sans-serif" font-weight="700">App / Agent</text>
  <text x="470" y="438" fill="#8D8D8D" font-size="18" font-family="Arial, sans-serif">chatbot, copilot, orchestration</text>

  <path d="M674 412H748" stroke="#F3F3F3" stroke-width="4" stroke-linecap="round"/>
  <path d="M740 394L774 412L740 430" fill="#F3F3F3"/>

