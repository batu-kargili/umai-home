  <text x="978" y="637" fill="#8D8D8D" font-size="16" font-family="Arial, sans-serif">tamper-evident record</text>

  <rect x="78" y="560" width="286" height="212" rx="30" fill="#111111" stroke="#2C2C2C" stroke-width="2"/>
  <text x="112" y="614" fill="#8D8D8D" font-size="16" font-family="Arial, sans-serif" font-weight="700" letter-spacing="2">PRE_LLM</text>
  <text x="112" y="658" fill="#FFFFFF" font-size="24" font-family="Arial, sans-serif" font-weight="700">Prompt injection</text>
  <text x="112" y="692" fill="#FFFFFF" font-size="24" font-family="Arial, sans-serif" font-weight="700">DLP and scope policy</text>
  <text x="112" y="736" fill="#8D8D8D" font-size="18" font-family="Arial, sans-serif">Stop unsafe traffic before the model sees it.</text>

  <rect x="392" y="560" width="286" height="212" rx="30" fill="#111111" stroke="#2C2C2C" stroke-width="2"/>
  <text x="426" y="614" fill="#8D8D8D" font-size="16" font-family="Arial, sans-serif" font-weight="700" letter-spacing="2">POST_LLM</text>
  <text x="426" y="658" fill="#FFFFFF" font-size="24" font-family="Arial, sans-serif" font-weight="700">Response inspection</text>
  <text x="426" y="692" fill="#FFFFFF" font-size="24" font-family="Arial, sans-serif" font-weight="700">Sensitive output checks</text>
  <text x="426" y="736" fill="#8D8D8D" font-size="18" font-family="Arial, sans-serif">Inspect what leaves the model before users see it.</text>

  <rect x="706" y="560" width="200" height="212" rx="30" fill="#111111" stroke="#2C2C2C" stroke-width="2"/>
  <text x="740" y="614" fill="#8D8D8D" font-size="16" font-family="Arial, sans-serif" font-weight="700" letter-spacing="2">DEPLOYMENT</text>
  <text x="740" y="662" fill="#FFFFFF" font-size="22" font-family="Arial, sans-serif" font-weight="700">SaaS</text>
  <text x="740" y="700" fill="#FFFFFF" font-size="22" font-family="Arial, sans-serif" font-weight="700">VPC</text>
  <text x="740" y="738" fill="#FFFFFF" font-size="22" font-family="Arial, sans-serif" font-weight="700">On-prem</text>

